services:

  postgres:
    image: postgres:15
    container_name: simpsons_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: Simpsons_db
    ports:
      - "5433:5432"

  streamlit:
    build: .
    container_name: simpsons_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - postgres